.check-lint:
  image: ${CONTAINER_REGISTRY_PATH}/ci-base:${DOCKER_IMAGE_TAG}
  script:
    - python3 tools/${CHECK_SCRIPT}.py
  parallel:
    matrix:
      - CHECK_SCRIPT:
        - check_doc
        - check_pycodestyle
        - check_spacing
        - check_tabs

.check-copyright:
  image: ${CONTAINER_REGISTRY_PATH}/ci-base:${DOCKER_IMAGE_TAG}
  script:
    - python3 tools/check_copyright.py -c \
      "${CI_MERGE_REQUEST_DIFF_BASE_SHA:-$(git merge-base HEAD origin/main)}"

.check-style:
  image: ${CONTAINER_REGISTRY_PATH}/ci-base:${DOCKER_IMAGE_TAG}
  script:
    - python3 tools/check_style.py -c \
      "${CI_MERGE_REQUEST_DIFF_BASE_SHA:-$(git merge-base HEAD origin/main)}"
  artifacts:
    when: on_failure
    expire_in: 2 days
    paths:
      - code-style.patch

.check-for-merge-commits:
  image: ${CONTAINER_REGISTRY_PATH}/ci-base:${DOCKER_IMAGE_TAG}
  script:
    - |
      merge_count=$(git log --merges --oneline \
        $CI_MERGE_REQUEST_DIFF_BASE_SHA..HEAD | wc -l)
      if [ $merge_count -gt 0 ]; then
        echo "Error: There are merge commits in the specified range."
        exit 1
      fi
      echo "SUCCESS: No merge commits in range."

.check-commit-msg:
  image: ${CONTAINER_REGISTRY_PATH}/ci-base:${DOCKER_IMAGE_TAG}
  script:
    - python3 tools/check_commit_msg.py -c \
      ${CI_MERGE_REQUEST_DIFF_BASE_SHA:-$(git merge-base HEAD origin/main)}
  artifacts:
    paths:
      - commit_msg_validation.xml  # Store XML file for review
    expire_in: 1 day
    reports:
      junit: commit_msg_validation.xml  # Attach XML report for GitLab MR

.check-code-security:
  image: ${CONTAINER_REGISTRY_PATH}/security:${DOCKER_IMAGE_TAG}
  tags:
    - amd64
  script:
    - git diff "${CI_MERGE_REQUEST_DIFF_BASE_SHA:-$(git merge-base HEAD origin/main)}" > new_functionality.diff
    - git apply -R new_functionality.diff
    - python3 /app/code_review.py review --patch-file new_functionality.diff --chroma-db /app/chroma_db --codebase-path .
    - |
      if [ ! -f review_output.json ]; then
        echo "Error: review_output.json not found. The review command might have failed."
        exit 1
      fi
      if jq -e '.reviews[] | select(.review | type == "array")' review_output.json > /dev/null; then
        echo "Security issues found, posting comments..."
      else
        echo "No security issues found in the patch."
        curl --fail --location --request POST \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" \
          --header "PRIVATE-TOKEN:${INTERNAL_REPO_API_KEY}" \
          --header "Content-Type:application/json" \
          --data '{"body":"No security issues found in the MR."}'
        exit 0
      fi
      COMMENT=''
      while read -r line; do
        file=$(echo "$line" | jq -r '.file')
        issue=$(echo "$line" | jq -r '.issue')
        mitigation=$(echo "$line" | jq -r '.mitigation')
        confidence=$(echo "$line" | jq -r '.confidence')
        explanation=$(echo "$line" | jq -r '.explanation')
        COMMENT+=$'**File:** '"$file"$'\n\n'
        COMMENT+=$'**Potential Security Issues:** '"$issue"$'\n\n'
        COMMENT+=$'**Mitigation:** '"$mitigation"$'\n\n'
        COMMENT+=$'**Confidence:** '"$confidence"$'\n\n'
        COMMENT+=$'**Explanation:** '"$explanation"$'\n\n'
        COMMENT+=$'---\n'
      done < <(
        jq -c '.reviews[] | select(.review | type == "array") | .file as $file | .review[] | {file: $file, issue, confidence, mitigation, explanation}' review_output.json
      )
      if [ -z "$COMMENT" ]; then
        echo "No comment to post."
        exit 0
      else
        echo "Final Formatted COMMENT:"
        echo "$COMMENT"
      fi
      jq -n --arg body "$COMMENT" '{body: $body}' > payload.json
      curl --fail --location --request POST \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" \
        --header "PRIVATE-TOKEN:${INTERNAL_REPO_API_KEY}" \
        --header "Content-Type:application/json" \
        --data @payload.json
  artifacts:
    when: always
    paths:
      - review_output.json
    expire_in: 1 day
