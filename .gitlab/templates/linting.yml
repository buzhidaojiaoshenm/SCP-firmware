.check-lint:
  image: ${CONTAINER_REGISTRY_PATH}/ci-base:${DOCKER_IMAGE_TAG}
  script:
    - python3 tools/${CHECK_SCRIPT}.py
  parallel:
    matrix:
      - CHECK_SCRIPT:
        - check_doc
        - check_pycodestyle
        - check_spacing
        - check_tabs

.check-copyright:
  image: ${CONTAINER_REGISTRY_PATH}/ci-base:${DOCKER_IMAGE_TAG}
  script:
    - python3 tools/check_copyright.py -c \
      "${CI_MERGE_REQUEST_DIFF_BASE_SHA:-$(git merge-base HEAD origin/main)}"

.check-style:
  image: ${CONTAINER_REGISTRY_PATH}/ci-base:${DOCKER_IMAGE_TAG}
  script:
    - python3 tools/check_style.py -c \
      "${CI_MERGE_REQUEST_DIFF_BASE_SHA:-$(git merge-base HEAD origin/main)}"
  artifacts:
    when: on_failure
    expire_in: 2 days
    paths:
      - code-style.patch

.check-for-merge-commits:
  image: ${CONTAINER_REGISTRY_PATH}/ci-base:${DOCKER_IMAGE_TAG}
  script:
    - |
      merge_count=$(git log --merges --oneline \
        $CI_MERGE_REQUEST_DIFF_BASE_SHA..HEAD | wc -l)
      if [ $merge_count -gt 0 ]; then
        echo "Error: There are merge commits in the specified range."
        exit 1
      fi
      echo "SUCCESS: No merge commits in range."

.check-commit-msg:
  image: ${CONTAINER_REGISTRY_PATH}/ci-base:${DOCKER_IMAGE_TAG}
  script:
    - python3 tools/check_commit_msg.py -c \
      ${CI_MERGE_REQUEST_DIFF_BASE_SHA:-$(git merge-base HEAD origin/main)}
  artifacts:
    paths:
      - commit_msg_validation.xml  # Store XML file for review
    expire_in: 1 day
    reports:
      junit: commit_msg_validation.xml  # Attach XML report for GitLab MR
